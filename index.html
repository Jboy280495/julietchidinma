<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
scroll-behavior:smooth;
}

header{
background:#1abc9c;
color:white;
padding:25px;
text-align:center;
}

nav{
background:#222;
padding:15px;
text-align:center;
}

nav a{
color:white;
margin:15px;
text-decoration:none;
font-weight:bold;
font-size:18px;
}

nav a:hover{
color:#1abc9c;
}

.slideshow{
width:100%;
height:420px;
overflow:hidden;
position:relative;
}

.slideshow img{
width:100%;
height:420px;
position:absolute;
animation:slide 18s infinite;
}

.slideshow img:nth-child(2){
animation-delay:6s;
}

.slideshow img:nth-child(3){
animation-delay:12s;
}

@keyframes slide{
0%{opacity:0;}
10%{opacity:1;}
30%{opacity:1;}
40%{opacity:0;}
100%{opacity:0;}
}

section{
padding:60px 20px;
text-align:center;
}

.card-container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
}

.card{
background:white;
padding:25px;
width:260px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
}

.card i{
font-size:40px;
color:#1abc9c;
margin-bottom:10px;
}

.gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.gallery img{
width:260px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

iframe{
margin-top:20px;
border-radius:10px;
}

footer{
background:#222;
color:white;
text-align:center;
padding:25px;
margin-top:40px;
}

</style>

</head>
